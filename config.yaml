# 配置文件 - 百度文心智能体批量上传工具

# Excel文件路径
excel:
  input_file: "kuake.xlsx"
  title_column: 1          # 标题所在列（A列）
  url_column: 2            # 链接所在列（B列）
  image_column: 3          # 图片链接列（C列）

# 百度BOS配置
bos:
  temp_folder: "temp_images"
  target_format: "JPEG"    # 图片转换格式: JPEG, PNG, GIF

# 百度文心智能体配置
agent:
  cookie_file: "baiduck.yaml"
  dataset_id: "你的知识库id"
  file_id: "你的id"
  api_url: "https://agents.baidu.com/lingjing/dataset/text/edit/table"

# 网络请求配置
network:
  timeout: 30              # 请求超时时间（秒）
  max_retries: 3           # 最大重试次数
  request_delay: 1         # 请求间隔（秒）

# 日志配置
logging:
  level: "INFO"
  log_file: "upload_to_agent.log"
